appId: com.voicetoprompt.app
productName: Voice to Prompt
directories:
  output: release
  buildResources: build
compression: maximum
win:
  target:
    - nsis
  icon: public/icon.png
publish: null
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
  - "!**/*.map"
  - "!**/node_modules/.cache/**"
  - "!**/*.ts"
extraResources:
  - from: "resources/whisper/"
    to: "whisper"
    filter:
      - "whisper-cli.exe"
      - "whisper-server.exe"
      - "whisper-cli"
      - "*.dll"
asar: true
asarUnpack:
  - "**/*.node"
  - "**/@nut-tree-fork/**"