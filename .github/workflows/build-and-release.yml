name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Get version from package.json
        id: version
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          Write-Output "current_version=$version" >> $env:GITHUB_OUTPUT

      - name: Auto-increment version
        id: increment
        run: |
          $version = "${{ steps.version.outputs.current_version }}"
          $parts = $version.Split('.')
          $parts[-1] = [int]$parts[-1] + 1
          $newVersion = $parts -join '.'
          Write-Output "new_version=$newVersion" >> $env:GITHUB_OUTPUT
          Write-Output "Package version: $version -> $newVersion"

      - name: Update package.json with new version
        run: |
          $json = Get-Content package.json | ConvertFrom-Json
          $json.version = "${{ steps.increment.outputs.new_version }}"
          $json | ConvertTo-Json -Depth 10 | Set-Content package.json

      - name: Install dependencies
        run: npm ci

      - name: Build the application
        run: npm run build

      - name: Find release files
        id: find-files
        run: |
          $nsis7z = Get-ChildItem -Path release -Filter "*.nsis.7z" -Recurse | Select-Object -First 1
          $exe = Get-ChildItem -Path release -Filter "*.exe" -Recurse | Where-Object { $_.Name -notlike "*uninstaller*" } | Select-Object -First 1
          
          $files = ""
          if ($nsis7z) {
            Write-Output "Found NSIS: $($nsis7z.Name)"
            $files += "$($nsis7z.FullName)"
          }
          if ($exe) {
            Write-Output "Found EXE: $($exe.Name)"
            if ($files) { $files += "`n" }
            $files += "$($exe.FullName)"
          }
          Write-Output "files=$files" >> $env:GITHUB_OUTPUT

      - name: Upload Release Asset
        if: steps.find-files.outputs.files != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.increment.outputs.new_version }}
          name: Voice to Prompt v${{ steps.increment.outputs.new_version }}
          body: |
            ## What's New
            Auto-generated release from commit ${{ github.sha }}
            
            **Version:** ${{ steps.increment.outputs.new_version }}
          files: |
            ${{ steps.find-files.outputs.files }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version bump
        if: steps.find-files.outputs.files != ''
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add package.json
          git commit -m "chore: bump version to ${{ steps.increment.outputs.new_version }}"
          git push
